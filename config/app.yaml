# ============================================================
# Personal AI OS — 应用主配置
# ============================================================
app:
  name: "Personal AI OS"
  version: "2.0.0"
  description: "运行于 Android Termux 的个人 AI 操作系统"
  debug: false
  dev_mode: false

server:
  host: "0.0.0.0"
  port: 8080
  workers: 1
  cors_origins: ["*"]
  sse_keepalive: 30

session:
  timeout: 3600
  max_concurrent: 10

upload:
  max_size_mb: 100
  allowed_extensions:
    - .txt
    - .md
    - .pdf
    - .png
    - .jpg
    - .jpeg
    - .gif
    - .mp3
    - .mp4
    - .csv
    - .json
    - .yaml
    - .yml

locale: "zh-CN"
timezone: "Asia/Shanghai"
